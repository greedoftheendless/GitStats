name: CD - Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate backend
        working-directory: backend
        run: node --check server.js

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r frontend/dist deploy/public
          cp -r backend/* deploy/
          cd deploy && rm -rf node_modules package-lock.json
          npm install --production

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: deploy/
          retention-days: 30

      - name: Generate deployment report
        run: |
          echo "## Production Deployment 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Ready for deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Frontend built and packaged" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend validated and packaged" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies installed (production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the 'production-build' artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Deploy to your server/platform" >> $GITHUB_STEP_SUMMARY
          echo "3. Run: \`npm start\` from the backend directory" >> $GITHUB_STEP_SUMMARY
